# Render Blueprint: Web Service + PostgreSQL (Python)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: user-detail-record
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: user-detail-db
          property: connectionString
databases:
  - name: user-detail-db
    databaseName: user_details
    user: user_details
